<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord ID Lookup</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: #5865F2;
            letter-spacing: -0.5px;
        }

        .admin-btn {
            background: transparent;
            border: 1px solid #5865F2;
            color: #5865F2;
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .admin-btn:hover {
            background: #5865F2;
            color: #fff;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        /* Search Box */
        .search-container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .search-title {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 10px;
            color: #fff;
        }

        .search-subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 20px 60px 20px 24px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: #5865F2;
        }

        .search-input::placeholder {
            color: #666;
        }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: #5865F2;
            border: none;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .search-btn:hover {
            background: #4752C4;
        }

        .search-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Result Card */
        .result-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 32px;
            margin-top: 32px;
            width: 100%;
            max-width: 600px;
            display: none;
        }

        .result-card.show {
            display: block;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid #333;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #333;
            object-fit: cover;
        }

        .profile-info h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .profile-info .username {
            color: #888;
            font-size: 0.95rem;
        }

        .info-grid {
            display: grid;
            gap: 16px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #0f0f0f;
            border-radius: 8px;
        }

        .info-item label {
            color: #888;
            font-size: 0.9rem;
        }

        .info-item span {
            color: #fff;
            font-weight: 500;
            font-family: monospace;
        }

        .not-found {
            background: #1a1a1a;
            border: 1px solid #ef4444;
            border-radius: 12px;
            padding: 24px;
            margin-top: 32px;
            color: #ef4444;
            text-align: center;
            display: none;
        }

        .not-found.show {
            display: block;
        }

        /* Admin Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow: hidden;
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 1.25rem;
        }

        .close-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .close-btn:hover {
            color: #fff;
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
            max-height: 70vh;
        }

        /* Login Form */
        .login-form {
            max-width: 400px;
            margin: 0 auto;
            padding: 40px;
        }

        .login-form input {
            width: 100%;
            padding: 16px;
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 16px;
        }

        .login-form button {
            width: 100%;
            padding: 16px;
            background: #5865F2;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* Admin Panel */
        .admin-panel {
            display: none;
        }

        .admin-panel.active {
            display: block;
        }

        .add-user-form {
            background: #0f0f0f;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: #5865F2;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-danger {
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        /* Users Table */
        .users-table {
            width: 100%;
            border-collapse: collapse;
        }

        .users-table th {
            text-align: left;
            padding: 12px;
            color: #888;
            font-weight: 500;
            font-size: 0.85rem;
            border-bottom: 1px solid #333;
        }

        .users-table td {
            padding: 16px 12px;
            border-bottom: 1px solid #222;
        }

        .users-table tr:hover {
            background: #0f0f0f;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #333;
            border-top-color: #5865F2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #5865F2;
            color: #fff;
            padding: 16px 24px;
            border-radius: 8px;
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 2000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            background: #ef4444;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <header>
        <div class="logo">DISCORD ID LOOKUP</div>
        <button class="admin-btn" onclick="openAdmin()">Admin Panel</button>
    </header>

    <main>
        <div class="search-container">
            <h1 class="search-title">ESTEDEV</h1>
            <p class="search-subtitle">Discord ID girerek kişi bilgilerini görüntüle</p>
            
            <div class="search-box">
                <input type="text" class="search-input" id="searchId" placeholder="Örn: 844227552293027890">
                <button class="search-btn" id="searchBtn" onclick="searchUser()">Ara</button>
            </div>

            <div id="loader" class="loading hidden"></div>

            <div id="resultCard" class="result-card">
                <div class="profile-header">
                    <img id="resAvatar" src="" alt="Avatar" class="avatar">
                    <div class="profile-info">
                        <h2 id="resName">-</h2>
                        <p class="username" id="resUser">-</p>
                    </div>
                </div>
                <div class="info-grid">
                    <div class="info-item">
                        <label>Discord ID</label>
                        <span id="resId">-</span>
                    </div>
                    <div class="info-item">
                        <label>E-posta</label>
                        <span id="resEmail">-</span>
                    </div>
                    <div class="info-item">
                        <label>Telefon</label>
                        <span id="resPhone">-</span>
                    </div>
                    <div class="info-item">
                        <label>Notlar</label>
                        <span id="resNotes">-</span>
                    </div>
                </div>
            </div>

            <div id="notFound" class="not-found">
                ❌ Bu ID ile kayıtlı kullanıcı bulunamadı
            </div>
        </div>
    </main>

    <!-- Admin Modal -->
    <div class="modal-overlay" id="adminModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Admin Panel</h2>
                <button class="close-btn" onclick="closeAdmin()">×</button>
            </div>
            <div class="modal-body">
                <!-- Login -->
                <div id="loginPanel" class="login-form">
                    <h3 style="margin-bottom: 20px; text-align: center;">Giriş Yap</h3>
                    <input type="password" id="adminPass" placeholder="Şifre">
                    <button onclick="login()">Giriş Yap</button>
                </div>

                <!-- Admin Panel -->
                <div id="adminPanel" class="admin-panel">
                    <div class="add-user-form">
                        <h3 style="margin-bottom: 16px;">Yeni Kişi Ekle</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <input type="text" id="newId" placeholder="Discord ID *">
                            </div>
                            <div class="form-group">
                                <input type="text" id="newName" placeholder="İsim">
                            </div>
                            <div class="form-group">
                                <input type="text" id="newUser" placeholder="Kullanıcı Adı">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <input type="email" id="newEmail" placeholder="E-posta">
                            </div>
                            <div class="form-group">
                                <input type="text" id="newPhone" placeholder="Telefon">
                            </div>
                            <div class="form-group">
                                <input type="text" id="newAvatar" placeholder="Avatar URL">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group" style="grid-column: 1 / -1;">
                                <input type="text" id="newNotes" placeholder="Notlar">
                            </div>
                        </div>
                        <button class="btn-primary" onclick="addUser()">Ekle</button>
                    </div>

                    <h3 style="margin-bottom: 16px;">Kayıtlı Kişiler</h3>
                    <table class="users-table">
                        <thead>
                            <tr>
                                <th>İsim</th>
                                <th>Discord ID</th>
                                <th>E-posta</th>
                                <th>İşlem</th>
                            </tr>
                        </thead>
                        <tbody id="usersList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // SUPABASE AYARLARI - BUNLARI DOLDUR
        const SUPABASE_URL = 'https://shpflhdeswhotrctzmqj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNocGZsaGRlc3dob3RyY3R6bXFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMjExNzIsImV4cCI6MjA4OTU5NzE3Mn0.YFWgiqX7K6iMQ7HFdjDmHD5E1ouhFhRArqni0LBnMmA';
        
        let supabase = null;
        let isLocalMode = false;

        // Başlat
        if (SUPABASE_URL.includes('YOUR_')) {
            console.log('Local mode aktif');
            isLocalMode = true;
        } else {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        const ADMIN_PASS = 'cemreyiseviyorum';
        let users = [];

        // Local Storage
        function getUsers() {
            return JSON.parse(localStorage.getItem('discord_users') || '[]');
        }

        function saveUsers(data) {
            localStorage.setItem('discord_users', JSON.stringify(data));
        }

        // Arama
        async function searchUser() {
            const id = document.getElementById('searchId').value.trim();
            if (!id) return showToast('ID girin', 'error');

            document.getElementById('searchBtn').disabled = true;
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('resultCard').classList.remove('show');
            document.getElementById('notFound').classList.remove('show');

            let user = null;

            if (isLocalMode) {
                await new Promise(r => setTimeout(r, 300));
                user = getUsers().find(u => u.discord_id === id);
            } else {
                const { data } = await supabase
                    .from('discord_users')
                    .select('*')
                    .eq('discord_id', id)
                    .single();
                user = data;
            }

            document.getElementById('loader').classList.add('hidden');
            document.getElementById('searchBtn').disabled = false;

            if (user) {
                showResult(user);
            } else {
                document.getElementById('notFound').classList.add('show');
            }
        }

        function showResult(user) {
            document.getElementById('resAvatar').src = user.avatar_url || 'https://cdn.discordapp.com/embed/avatars/0.png';
            document.getElementById('resName').textContent = user.name || user.username || 'Bilinmiyor';
            document.getElementById('resUser').textContent = user.username ? '@' + user.username : '';
            document.getElementById('resId').textContent = user.discord_id;
            document.getElementById('resEmail').textContent = user.email || 'Belirtilmemiş';
            document.getElementById('resPhone').textContent = user.phone || 'Belirtilmemiş';
            document.getElementById('resNotes').textContent = user.notes || 'Not yok';
            
            document.getElementById('resultCard').classList.add('show');
        }

        // Admin
        function openAdmin() {
            document.getElementById('adminModal').classList.add('active');
        }

        function closeAdmin() {
            document.getElementById('adminModal').classList.remove('active');
            document.getElementById('loginPanel').style.display = 'block';
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('adminPass').value = '';
        }

        function login() {
            if (document.getElementById('adminPass').value === ADMIN_PASS) {
                document.getElementById('loginPanel').style.display = 'none';
                document.getElementById('adminPanel').classList.add('active');
                loadUsers();
            } else {
                showToast('Yanlış şifre', 'error');
            }
        }

        async function loadUsers() {
            if (isLocalMode) {
                users = getUsers();
            } else {
                const { data } = await supabase.from('discord_users').select('*').order('created_at', { ascending: false });
                users = data || [];
            }
            renderUsers();
        }

        function renderUsers() {
            const tbody = document.getElementById('usersList');
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>${u.name || u.username || '-'}</td>
                    <td>${u.discord_id}</td>
                    <td>${u.email || '-'}</td>
                    <td><button class="btn-danger" onclick="deleteUser('${u.id}')">Sil</button></td>
                </tr>
            `).join('');
        }

        async function addUser() {
            const newUser = {
                id: isLocalMode ? Date.now().toString() : undefined,
                discord_id: document.getElementById('newId').value,
                name: document.getElementById('newName').value,
                username: document.getElementById('newUser').value,
                email: document.getElementById('newEmail').value,
                phone: document.getElementById('newPhone').value,
                avatar_url: document.getElementById('newAvatar').value,
                notes: document.getElementById('newNotes').value,
                created_at: new Date().toISOString()
            };

            if (!newUser.discord_id) return showToast('Discord ID gerekli', 'error');

            if (isLocalMode) {
                const list = getUsers();
                if (list.find(u => u.discord_id === newUser.discord_id)) {
                    return showToast('Bu ID zaten var', 'error');
                }
                list.push(newUser);
                saveUsers(list);
                showToast('Eklendi', 'success');
                clearForm();
                loadUsers();
            } else {
                const { error } = await supabase.from('discord_users').insert([newUser]);
                if (error) return showToast(error.message, 'error');
                showToast('Eklendi', 'success');
                clearForm();
                loadUsers();
            }
        }

        async function deleteUser(id) {
            if (!confirm('Silmek istediğinize emin misiniz?')) return;
            
            if (isLocalMode) {
                saveUsers(getUsers().filter(u => u.id != id));
                loadUsers();
            } else {
                await supabase.from('discord_users').delete().eq('id', id);
                loadUsers();
            }
        }

        function clearForm() {
            document.getElementById('newId').value = '';
            document.getElementById('newName').value = '';
            document.getElementById('newUser').value = '';
            document.getElementById('newEmail').value = '';
            document.getElementById('newPhone').value = '';
            document.getElementById('newAvatar').value = '';
            document.getElementById('newNotes').value = '';
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + (type === 'error' ? 'error' : '');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        document.getElementById('searchId').addEventListener('keypress', e => {
            if (e.key === 'Enter') searchUser();
        });
        document.getElementById('adminPass').addEventListener('keypress', e => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
