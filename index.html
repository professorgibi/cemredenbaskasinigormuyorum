<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Archive | Kutsal Veritabanı</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #d4af37;
            --gold-light: #f4d03f;
            --gold-dark: #b8860b;
            --purple: #4a148c;
            --purple-light: #7c43bd;
            --dark: #0a0a0f;
            --darker: #050508;
            --panel: rgba(20, 20, 30, 0.8);
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: var(--darker);
            color: #e8e8e8;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .cosmic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(212, 175, 55, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(74, 20, 140, 0.2) 0%, transparent 50%),
                var(--darker);
        }

        .orbs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            animation: drift 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
            top: -10%;
            left: -10%;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--purple-light) 0%, transparent 70%);
            top: 40%;
            right: -5%;
            animation-delay: -7s;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        .mandala {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 800px;
            z-index: -1;
            opacity: 0.05;
            animation: rotate 60s linear infinite;
        }

        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            padding: 50px 20px 30px;
        }

        .divine-title {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.4));
        }

        .subtitle {
            font-size: 1.1rem;
            color: rgba(232, 232, 232, 0.5);
            margin-top: 15px;
            letter-spacing: 0.6em;
            text-transform: uppercase;
        }

        .divider {
            width: 300px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 30px auto;
            position: relative;
        }

        .divider::before {
            content: '◈';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: var(--gold);
            font-size: 1.5rem;
            background: var(--darker);
            padding: 0 20px;
        }

        .celestial-nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .nav-rune {
            padding: 14px 36px;
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.25);
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s;
        }

        .nav-rune.active {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--gold);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .realm {
            display: none;
            width: 100%;
            max-width: 800px;
        }

        .realm.active {
            display: block;
            animation: materialize 0.6s ease;
        }

        @keyframes materialize {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .oracle-ring {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 50px;
        }

        .ring-outer {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--gold);
            animation: spin 8s linear infinite;
        }

        .ring-inner {
            position: absolute;
            inset: 40px;
            border-radius: 50%;
            background: var(--panel);
            border: 1px solid rgba(212, 175, 55, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .oracle-input {
            width: 75%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--gold-light);
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            text-align: center;
            padding: 12px;
            outline: none;
            margin-bottom: 20px;
        }

        .oracle-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 1px solid var(--gold);
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .oracle-btn:hover {
            background: var(--gold);
            color: var(--dark);
        }

        .manifestation {
            background: var(--panel);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 24px;
            padding: 40px;
            display: none;
        }

        .manifestation.revealed {
            display: block;
            animation: manifest 0.5s ease;
        }

        @keyframes manifest {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .essence-header {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .avatar-glow {
            position: relative;
            width: 90px;
            height: 90px;
        }

        .avatar-glow::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--gold), var(--purple-light), var(--gold));
            animation: rotate 4s linear infinite;
        }

        .avatar {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--dark);
        }

        .identity h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            color: var(--gold-light);
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
        }

        .data-item {
            background: rgba(0, 0, 0, 0.2);
            border-left: 2px solid var(--gold);
            padding: 18px;
            border-radius: 0 12px 12px 0;
        }

        .data-item label {
            display: block;
            font-family: 'Cinzel', serif;
            font-size: 0.7rem;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .not-found {
            background: var(--panel);
            border: 1px solid rgba(231, 76, 60, 0.3);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            color: #e74c3c;
            display: none;
        }

        .not-found.revealed {
            display: block;
        }

        .temple-gate {
            max-width: 420px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 50px;
            text-align: center;
        }

        .gate-title {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 1.3rem;
            margin-bottom: 30px;
        }

        .gate-input {
            width: 100%;
            padding: 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 10px;
            color: var(--gold-light);
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
        }

        .gate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            border: none;
            border-radius: 10px;
            color: var(--dark);
            font-family: 'Cinzel', serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }

        .sanctum {
            display: none;
        }

        .sanctum.revealed {
            display: block;
        }

        .upload-zone {
            background: var(--panel);
            border: 2px dashed rgba(212, 175, 55, 0.25);
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.05);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .upload-text {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 1.1rem;
        }

        .file-input {
            display: none;
        }

        .creation-form {
            background: var(--panel);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 20px;
            padding: 35px;
            margin-bottom: 30px;
        }

        .form-title {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 25px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 1.05rem;
            outline: none;
        }

        .btn-create {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--purple), var(--purple-light));
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Cinzel', serif;
            cursor: pointer;
        }

        .souls-list {
            background: var(--panel);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 20px;
            padding: 30px;
        }

        .soul-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.08);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .soul-info h4 {
            font-family: 'Cinzel', serif;
            color: var(--gold-light);
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            background: transparent;
            color: var(--gold);
            cursor: pointer;
            margin-left: 8px;
        }

        .btn-icon.delete {
            border-color: rgba(231, 76, 60, 0.3);
            color: #e74c3c;
        }

        footer {
            text-align: center;
            padding: 30px;
            margin-top: auto;
        }

        .developer {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            color: rgba(232, 232, 232, 0.3);
        }

        .developer span {
            color: var(--gold);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 18px 28px;
            border-radius: 12px;
            color: #fff;
            font-family: 'Cinzel', serif;
            transform: translateX(400px);
            transition: transform 0.4s;
            z-index: 2000;
            border: 1px solid;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            background: rgba(39, 174, 96, 0.15);
            border-color: #27ae60;
        }

        .toast.error {
            background: rgba(231, 76, 60, 0.15);
            border-color: #e74c3c;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-left: 10px;
        }

        .status-online {
            background: rgba(39, 174, 96, 0.2);
            color: #27ae60;
            border: 1px solid #27ae60;
        }

        .status-offline {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid #e74c3c;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="cosmic-bg"></div>
    
    <div class="orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <svg class="mandala" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="0.2"/>
        <circle cx="50" cy="50" r="35" fill="none" stroke="currentColor" stroke-width="0.2"/>
        <circle cx="50" cy="50" r="20" fill="none" stroke="currentColor" stroke-width="0.2"/>
    </svg>

    <div class="container">
        <header>
            <h1 class="divine-title">Divine Archive</h1>
            <div class="divider"></div>
            <p class="subtitle">Kutsal Veritabanı</p>
        </header>

        <nav class="celestial-nav">
            <button class="nav-rune active" onclick="changeRealm('lookup')">Kehanet</button>
            <button class="nav-rune" onclick="changeRealm('admin')">Tapınak</button>
        </nav>

        <main>
            <!-- Lookup -->
            <section id="realm-lookup" class="realm active">
                <div class="search-container">
                    <div class="oracle-ring">
                        <div class="ring-outer"></div>
                        <div class="ring-inner">
                            <input type="text" class="oracle-input" id="searchInput" placeholder="Discord ID">
                            <button class="oracle-btn" onclick="search()">Ara</button>
                        </div>
                    </div>

                    <div id="connectionStatus" style="text-align: center; margin-bottom: 20px;">
                        <span id="statusText" class="status-badge status-offline">Local Mode</span>
                    </div>

                    <div id="result" class="manifestation">
                        <div class="essence-header">
                            <div class="avatar-glow">
                                <img id="resAvatar" src="" class="avatar">
                            </div>
                            <div class="identity">
                                <h2 id="resName">-</h2>
                                <p id="resUser" style="color: rgba(232,232,232,0.5);">-</p>
                            </div>
                        </div>
                        <div class="data-grid">
                            <div class="data-item">
                                <label>Discord ID</label>
                                <span id="resId">-</span>
                            </div>
                            <div class="data-item">
                                <label>E-posta</label>
                                <span id="resEmail">-</span>
                            </div>
                            <div class="data-item">
                                <label>Telefon</label>
                                <span id="resPhone">-</span>
                            </div>
                            <div class="data-item" style="grid-column: 1 / -1;">
                                <label>Notlar</label>
                                <span id="resNotes">-</span>
                            </div>
                        </div>
                    </div>

                    <div id="notFound" class="not-found">
                        <p>⚠️ Bu ID ile kayıtlı ruh bulunamadı</p>
                    </div>
                </div>
            </section>

            <!-- Admin -->
            <section id="realm-admin" class="realm">
                <div id="gate" class="temple-gate">
                    <h2 class="gate-title">Tapınak Girişi</h2>
                    <input type="password" class="gate-input" id="gatePass" placeholder="Kutsal Şifre">
                    <button class="gate-btn" onclick="enter()">Giriş Yap</button>
                </div>

                <div id="sanctum" class="sanctum">
                    <!-- File Upload -->
                    <div class="upload-zone" id="dropZone">
                        <div class="upload-icon">📜</div>
                        <div class="upload-text">Kutsal Yazı Yükle</div>
                        <div style="color: rgba(232,232,232,0.4); font-size: 0.9rem; margin-top: 8px;">
                            JSON veya SQL dosyasını sürükleyin veya tıklayın
                        </div>
                        <input type="file" class="file-input" id="fileIn" accept=".json,.sql">
                    </div>

                    <!-- Manual Form -->
                    <div class="creation-form">
                        <h3 class="form-title">✦ Yeni Ruh Kaydet ✦</h3>
                        <div class="form-grid">
                            <div class="input-group">
                                <input type="text" id="newId" placeholder="Discord ID *">
                            </div>
                            <div class="input-group">
                                <input type="text" id="newName" placeholder="İsim">
                            </div>
                            <div class="input-group">
                                <input type="text" id="newUser" placeholder="Kullanıcı Adı">
                            </div>
                            <div class="input-group">
                                <input type="email" id="newEmail" placeholder="E-posta">
                            </div>
                            <div class="input-group">
                                <input type="text" id="newPhone" placeholder="Telefon">
                            </div>
                            <div class="input-group">
                                <input type="text" id="newAvatar" placeholder="Avatar URL">
                            </div>
                            <div class="input-group" style="grid-column: 1 / -1;">
                                <textarea id="newNotes" rows="2" placeholder="Notlar"></textarea>
                            </div>
                        </div>
                        <button class="btn-create" onclick="save()">Kaydet</button>
                    </div>

                    <!-- List -->
                    <div class="souls-list">
                        <h3 style="font-family: Cinzel; color: var(--gold); margin-bottom: 20px;">📜 Kayıtlı Ruhlar</h3>
                        <div id="list"></div>
                    </div>

                    <button class="gate-btn" onclick="exit()" style="margin-top: 20px; background: linear-gradient(135deg, #c0392b, #e74c3c);">
                        Ayrıl
                    </button>
                </div>
            </section>
        </main>

        <footer>
            <p class="developer"><span>estedev</span> tarafından geliştirildi</p>
        </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ===== SUPABASE CONFIG =====
        const SUPABASE_URL = 'https://shpflhdeswhotrctzmqj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNocGZsaGRlc3dob3RyY3R6bXFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMjExNzIsImV4cCI6MjA4OTU5NzE3Mn0.YFWgiqX7K6iMQ7HFdjDmHD5E1ouhFhRArqni0LBnMmA';
        
        let db = null;
        let useSQL = false;
        
        // Bağlantı dene
        async function initDB() {
            try {
                if (SUPABASE_URL.includes('YOUR_') || SUPABASE_KEY.includes('YOUR_')) {
                    console.log('Local mode - Supabase bilgileri girilmemiş');
                    updateStatus(false);
                    return;
                }
                
                const { createClient } = supabase;
                db = createClient(SUPABASE_URL, SUPABASE_KEY);
                
                // Test bağlantı
                const { data, error } = await db.from('souls').select('count').limit(1);
                
                if (!error) {
                    useSQL = true;
                    updateStatus(true);
                    console.log('SQL Connected');
                } else {
                    console.error('SQL Error:', error);
                    updateStatus(false);
                }
            } catch(e) {
                console.error('Connection failed:', e);
                updateStatus(false);
            }
        }

        function updateStatus(connected) {
            const badge = document.getElementById('statusText');
            if (connected) {
                badge.textContent = 'SQL Connected';
                badge.className = 'status-badge status-online';
            } else {
                badge.textContent = 'Local Mode';
                badge.className = 'status-badge status-offline';
            }
        }

        // Local storage
        const KEY = 'divine_souls_v2';
        const getSouls = () => JSON.parse(localStorage.getItem(KEY) || '[]');
        const setSouls = (d) => localStorage.setItem(KEY, JSON.stringify(d));

        // Navigation
        function changeRealm(r) {
            document.querySelectorAll('.realm').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-rune').forEach(x => x.classList.remove('active'));
            document.getElementById('realm-' + r).classList.add('active');
            event.target.classList.add('active');
        }

        // Search
        async function search() {
            const id = document.getElementById('searchInput').value.trim();
            if (!id) return toast('ID girin', 'error');

            document.getElementById('result').classList.remove('revealed');
            document.getElementById('notFound').classList.remove('revealed');

            let soul = null;

            if (useSQL && db) {
                try {
                    const { data, error } = await db.from('souls').select('*').eq('discord_id', id).single();
                    if (!error && data) soul = data;
                } catch(e) {
                    console.error('Search error:', e);
                }
            }
            
            // Local fallback
            if (!soul) {
                soul = getSouls().find(s => s.discord_id === id);
            }

            if (soul) {
                showResult(soul);
            } else {
                document.getElementById('notFound').classList.add('revealed');
            }
        }

        function showResult(s) {
            const avatarUrl = s.avatar_url || s.avatar_hash || 
                `https://cdn.discordapp.com/embed/avatars/${Math.floor(Math.random() * 6)}.png`;
            
            document.getElementById('resAvatar').src = avatarUrl;
            document.getElementById('resName').textContent = s.name || 'İsimsiz Ruh';
            document.getElementById('resUser').textContent = s.username ? `@${s.username}` : '';
            document.getElementById('resId').textContent = s.discord_id;
            document.getElementById('resEmail').textContent = s.email || 'Belirtilmemiş';
            document.getElementById('resPhone').textContent = s.phone || 'Belirtilmemiş';
            document.getElementById('resNotes').textContent = s.notes || 'Not bulunmuyor';
            document.getElementById('result').classList.add('revealed');
        }

        // Admin
        function enter() {
            if (document.getElementById('gatePass').value === 'cemreyiseviyorum') {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('sanctum').classList.add('revealed');
                loadList();
                toast('Hoş geldiniz', 'success');
            } else {
                toast('Yanlış şifre', 'error');
            }
        }

        function exit() {
            document.getElementById('sanctum').classList.remove('revealed');
            document.getElementById('gate').style.display = 'block';
            document.getElementById('gatePass').value = '';
        }

        // ===== FILE UPLOAD - DÜZELTİLMİŞ =====
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileIn');

        // Tıklayarak aç
        dropZone.addEventListener('click', (e) => {
            if (e.target !== fileInput) {
                fileInput.click();
            }
        });

        // Dosya seçildiğinde
        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });

        // Drag & Drop
        dropZone.addEventListener('dragenter', (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files && files[0]) {
                handleFile(files[0]);
            }
        });

        async function handleFile(file) {
            console.log('File received:', file.name);
            
            if (!file.name.match(/\.(json|sql)$/i)) {
                return toast('Sadece .json veya .sql dosyası', 'error');
            }

            try {
                const text = await file.text();
                console.log('File content loaded, length:', text.length);

                if (file.name.endsWith('.json')) {
                    const data = JSON.parse(text);
                    console.log('JSON parsed:', Array.isArray(data) ? `Array[${data.length}]` : 'Object');
                    
                    if (Array.isArray(data)) {
                        for (const item of data) {
                            await importSoul(item);
                        }
                        toast(`${data.length} kayıt yüklendi`, 'success');
                    } else {
                        await importSoul(data);
                        toast('1 kayıt yüklendi', 'success');
                    }
                } else if (file.name.endsWith('.sql')) {
                    // SQL parse
                    const lines = text.split('\n');
                    let count = 0;
                    
                    for (const line of lines) {
                        const match = line.match(/INSERT INTO.*?VALUES\s*\((.+)\)/i);
                        if (match) {
                            // Parse values
                            const values = match[1].split(',').map(v => v.trim().replace(/^'|'$/g, ''));
                            const soul = {
                                discord_id: values[0] || '',
                                name: values[1] || '',
                                username: values[2] || '',
                                email: values[3] || '',
                                phone: values[4] || '',
                                avatar_url: values[5] || '',
                                notes: values[6] || ''
                            };
                            await importSoul(soul);
                            count++;
                        }
                    }
                    toast(`${count} SQL kayıt yüklendi`, 'success');
                }
                
                loadList();
            } catch(e) {
                console.error('File error:', e);
                toast('Dosya okunamadı: ' + e.message, 'error');
            }
        }

        async function importSoul(data) {
            if (!data || !data.discord_id) {
                console.log('Invalid data, skipping');
                return;
            }

            const soul = {
                discord_id: data.discord_id.toString(),
                name: (data.name || data.username || '').toString(),
                username: (data.username || '').toString(),
                email: (data.email || '').toString(),
                phone: (data.phone || '').toString(),
                avatar_url: (data.avatar_url || data.avatar_hash || '').toString(),
                notes: (data.notes || '').toString()
            };

            console.log('Importing:', soul.discord_id);

            // SQL'e kaydet
            if (useSQL && db) {
                try {
                    const { error } = await db.from('souls').insert([soul]);
                    if (error && error.code !== '23505') { // 23505 = duplicate
                        console.error('SQL insert error:', error);
                    }
                } catch(e) {
                    console.error('SQL error:', e);
                }
            }

            // Local'a da kaydet (backup)
            const souls = getSouls();
            if (!souls.find(s => s.discord_id === soul.discord_id)) {
                soul.id = Date.now().toString();
                soul.created_at = new Date().toISOString();
                souls.push(soul);
                setSouls(souls);
            }
        }

        // Manual Save
        async function save() {
            const soul = {
                discord_id: document.getElementById('newId').value.trim(),
                name: document.getElementById('newName').value.trim(),
                username: document.getElementById('newUser').value.trim(),
                email: document.getElementById('newEmail').value.trim(),
                phone: document.getElementById('newPhone').value.trim(),
                avatar_url: document.getElementById('newAvatar').value.trim(),
                notes: document.getElementById('newNotes').value.trim()
            };

            if (!soul.discord_id) return toast('Discord ID gerekli', 'error');

            // SQL
            if (useSQL && db) {
                try {
                    const { error } = await db.from('souls').insert([soul]);
                    if (error) {
                        if (error.code === '23505') {
                            return toast('Bu ID zaten var (SQL)', 'error');
                        }
                        console.error('SQL save error:', error);
                    }
                } catch(e) {
                    console.error('Save error:', e);
                }
            }

            // Local
            const souls = getSouls();
            if (souls.find(s => s.discord_id === soul.discord_id)) {
                return toast('Bu ID zaten var (Local)', 'error');
            }
            
            soul.id = Date.now().toString();
            soul.created_at = new Date().toISOString();
            souls.push(soul);
            setSouls(souls);

            clearForm();
            loadList();
            toast('Kaydedildi', 'success');
        }

        // Load List
        async function loadList() {
            let souls = [];

            // SQL'den çek
            if (useSQL && db) {
                try {
                    const { data, error } = await db.from('souls').select('*').order('created_at', { ascending: false });
                    if (!error && data) {
                        souls = data;
                        // Local'ı sync et
                        setSouls(souls);
                    }
                } catch(e) {
                    console.error('Load error:', e);
                }
            }

            // Local'dan çek (fallback)
            if (souls.length === 0) {
                souls = getSouls();
            }

            const container = document.getElementById('list');
            if (souls.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:rgba(232,232,232,0.4);padding:20px;">Kayıt yok</p>';
                return;
            }

            container.innerHTML = souls.map(s => `
                <div class="soul-card">
                    <div class="soul-info">
                        <h4>${s.name || 'İsimsiz'}</h4>
                        <small style="color: rgba(232,232,232,0.4);">${s.discord_id}</small>
                    </div>
                    <div>
                        <button class="btn-icon" onclick="loadForEdit('${s.id}')">✎</button>
                        <button class="btn-icon delete" onclick="remove('${s.id}')">✕</button>
                    </div>
                </div>
            `).join('');
        }

        async function remove(id) {
            if (!confirm('Silmek istediğinize emin misiniz?')) return;

            // SQL
            if (useSQL && db) {
                try {
                    await db.from('souls').delete().eq('id', id);
                } catch(e) {
                    console.error('Delete error:', e);
                }
            }

            // Local
            setSouls(getSouls().filter(s => s.id !== id));
            loadList();
            toast('Silindi', 'success');
        }

        function loadForEdit(id) {
            const souls = getSouls();
            const s = souls.find(x => x.id === id);
            if (!s) return;

            document.getElementById('newId').value = s.discord_id;
            document.getElementById('newName').value = s.name || '';
            document.getElementById('newUser').value = s.username || '';
            document.getElementById('newEmail').value = s.email || '';
            document.getElementById('newPhone').value = s.phone || '';
            document.getElementById('newAvatar').value = s.avatar_url || '';
            document.getElementById('newNotes').value = s.notes || '';

            remove(id);
            toast('Düzenleme için yüklendi', 'success');
        }

        function clearForm() {
            document.getElementById('newId').value = '';
            document.getElementById('newName').value = '';
            document.getElementById('newUser').value = '';
            document.getElementById('newEmail').value = '';
            document.getElementById('newPhone').value = '';
            document.getElementById('newAvatar').value = '';
            document.getElementById('newNotes').value = '';
        }

        function toast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // Enter keys
        document.getElementById('searchInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') search();
        });
        document.getElementById('gatePass').addEventListener('keypress', e => {
            if (e.key === 'Enter') enter();
        });

        // Init
        initDB();
    </script>
</body>
</html>
