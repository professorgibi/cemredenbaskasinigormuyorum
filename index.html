<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Archive | Kutsal Veritabanı</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --gold: #d4af37;
            --dark: #0a0a0f;
            --panel: rgba(20, 20, 30, 0.9);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #050508;
            color: #e8e8e8;
            min-height: 100vh;
        }

        .cosmic-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at 20% 20%, rgba(212, 175, 55, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(74, 20, 140, 0.2) 0%, transparent 50%);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #f4d03f, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.3em;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .nav-btn {
            padding: 12px 30px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-btn.active {
            background: rgba(212, 175, 55, 0.2);
        }

        .section {
            display: none;
            animation: fadeIn 0.5s;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .search-box {
            text-align: center;
            padding: 40px;
        }

        .search-input {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            background: var(--panel);
            border: 1px solid var(--gold);
            border-radius: 10px;
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 20px;
        }

        .search-btn {
            padding: 15px 40px;
            background: var(--gold);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }

        .result-card {
            background: var(--panel);
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
            display: none;
        }

        .result-card.show {
            display: block;
        }

        .admin-login {
            max-width: 400px;
            margin: 0 auto;
            background: var(--panel);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
        }

        .admin-panel {
            display: none;
        }

        .admin-panel.show {
            display: block;
        }

        .upload-area {
            background: var(--panel);
            border: 2px dashed var(--gold);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .upload-area:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-grid input, .form-grid textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 8px;
            color: #fff;
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-danger {
            background: #e74c3c;
            color: #fff;
        }

        .souls-list {
            background: var(--panel);
            border-radius: 15px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .soul-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .soul-item:hover {
            background: rgba(212, 175, 55, 0.05);
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: #fff;
            transform: translateX(400px);
            transition: transform 0.3s;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success { background: #27ae60; }
        .toast.error { background: #e74c3c; }

        .progress {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 15px;
            display: none;
        }

        .progress-bar {
            height: 100%;
            background: var(--gold);
            width: 0%;
            transition: width 0.3s;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: var(--panel);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 1.5rem;
            color: var(--gold);
        }

        footer {
            text-align: center;
            padding: 30px;
            color: rgba(255,255,255,0.3);
        }

        footer span {
            color: var(--gold);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="cosmic-bg"></div>
    
    <div class="container">
        <header>
            <h1>DIVINE ARCHIVE</h1>
            <p style="color: rgba(255,255,255,0.5); margin-top: 10px;">Kutsal Veritabanı</p>
        </header>

        <div class="nav">
            <button class="nav-btn active" onclick="showSection('search')">Ara</button>
            <button class="nav-btn" onclick="showSection('admin')">Admin</button>
        </div>

        <!-- Search -->
        <section id="search-section" class="section active">
            <div class="search-box">
                <input type="text" class="search-input" id="searchId" placeholder="Discord ID girin">
                <br>
                <button class="search-btn" onclick="search()">Ara</button>
                
                <div id="result" class="result-card">
                    <h3 id="resName" style="color: var(--gold); margin-bottom: 5px;"></h3>
                    <p id="resUser" style="color: rgba(255,255,255,0.5); margin-bottom: 20px;"></p>
                    <p><strong>ID:</strong> <span id="resId"></span></p>
                    <p><strong>Email:</strong> <span id="resEmail"></span></p>
                    <p><strong>Telefon:</strong> <span id="resPhone"></span></p>
                    <p><strong>Notlar:</strong> <span id="resNotes"></span></p>
                </div>

                <div id="notFound" class="result-card" style="border: 1px solid #e74c3c;">
                    <p style="color: #e74c3c;">❌ Kayıt bulunamadı</p>
                </div>
            </div>
        </section>

        <!-- Admin -->
        <section id="admin-section" class="section">
            <div id="loginPanel" class="admin-login">
                <h3 style="color: var(--gold); margin-bottom: 20px;">Admin Girişi</h3>
                <input type="password" id="adminPass" placeholder="Şifre" style="width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--gold); border-radius: 8px; color: #fff;">
                <button class="btn-primary" onclick="login()">Giriş</button>
            </div>

            <div id="adminPanel" class="admin-panel">
                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-number" id="statTotal">0</div>
                        <div style="font-size: 0.8rem; color: rgba(255,255,255,0.5);">Toplam</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="statLoaded">0</div>
                        <div style="font-size: 0.8rem; color: rgba(255,255,255,0.5);">Yüklenen</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="statSkipped">0</div>
                        <div style="font-size: 0.8rem; color: rgba(255,255,255,0.5);">Atlanan</div>
                    </div>
                </div>

                <div class="upload-area" id="dropZone">
                    <div style="font-size: 2rem; margin-bottom: 10px;">📁</div>
                    <div style="color: var(--gold); font-weight: bold;">Dosya Yükle</div>
                    <div style="color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-top: 5px;">
                        JSON, SQL, CSV, TXT - Sürükle veya tıkla
                    </div>
                    <div class="progress" id="progress">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <input type="file" id="fileInput" style="display: none;" accept=".json,.sql,.csv,.txt">
                </div>

                <div style="background: var(--panel); padding: 20px; border-radius: 15px; margin-bottom: 20px;">
                    <h4 style="color: var(--gold); margin-bottom: 15px;">Yeni Ekle</h4>
                    <div class="form-grid">
                        <input type="text" id="newId" placeholder="Discord ID *">
                        <input type="text" id="newName" placeholder="İsim">
                        <input type="text" id="newUser" placeholder="Kullanıcı Adı">
                        <input type="email" id="newEmail" placeholder="Email">
                        <input type="text" id="newPhone" placeholder="Telefon">
                        <input type="text" id="newAvatar" placeholder="Avatar URL">
                    </div>
                    <textarea id="newNotes" placeholder="Notlar" style="width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 8px; color: #fff; margin-bottom: 15px;"></textarea>
                    <button class="btn-primary" onclick="addManual()">Ekle</button>
                </div>

                <div class="souls-list" id="soulsList">
                    <h4 style="color: var(--gold); margin-bottom: 15px;">Kayıtlar</h4>
                </div>

                <button class="btn-primary btn-danger" onclick="logout()" style="margin-top: 20px;">Çıkış</button>
            </div>
        </section>

        <footer>
            <span>estedev</span> tarafından geliştirildi
        </footer>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Config
        const SUPABASE_URL = 'https://shpflhdeswhotrctzmqj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNocGZsaGRlc3dob3RyY3R6bXFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMjExNzIsImV4cCI6MjA4OTU5NzE3Mn0.YFWgiqX7K6iMQ7HFdjDmHD5E1ouhFhRArqni0LBnMmA';
        
        let db = null;
        let useSQL = false;
        
        // Init
        if (!SUPABASE_URL.includes('YOUR_')) {
            try {
                db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                useSQL = true;
            } catch(e) {}
        }

        // Storage
        const STORAGE_KEY = 'divine_archive_v1';
        const getData = () => JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        const setData = (d) => localStorage.setItem(STORAGE_KEY, JSON.stringify(d));

        // Stats
        let loadedCount = 0;
        let skippedCount = 0;

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id + '-section').classList.add('active');
            event.target.classList.add('active');
        }

        // Search
        async function search() {
            const id = document.getElementById('searchId').value.trim();
            if (!id) return showToast('ID girin', 'error');

            document.getElementById('result').classList.remove('show');
            document.getElementById('notFound').classList.remove('show');

            let found = null;

            // SQL
            if (useSQL && db) {
                try {
                    const { data } = await db.from('souls').select('*').eq('discord_id', id).single();
                    if (data) found = data;
                } catch(e) {}
            }

            // Local
            if (!found) {
                found = getData().find(x => x.discord_id === id);
            }

            if (found) {
                document.getElementById('resName').textContent = found.name || 'İsimsiz';
                document.getElementById('resUser').textContent = found.username ? '@' + found.username : '';
                document.getElementById('resId').textContent = found.discord_id;
                document.getElementById('resEmail').textContent = found.email || '-';
                document.getElementById('resPhone').textContent = found.phone || '-';
                document.getElementById('resNotes').textContent = found.notes || '-';
                document.getElementById('result').classList.add('show');
            } else {
                document.getElementById('notFound').classList.add('show');
            }
        }

        // Admin
        function login() {
            if (document.getElementById('adminPass').value === 'cemreyiseviyorum') {
                document.getElementById('loginPanel').classList.add('hidden');
                document.getElementById('adminPanel').classList.add('show');
                updateList();
                updateStats();
            } else {
                showToast('Yanlış şifre', 'error');
            }
        }

        function logout() {
            document.getElementById('adminPanel').classList.remove('show');
            document.getElementById('loginPanel').classList.remove('hidden');
            document.getElementById('adminPass').value = '';
        }

        function updateStats() {
            const data = getData();
            document.getElementById('statTotal').textContent = data.length;
            document.getElementById('statLoaded').textContent = loadedCount;
            document.getElementById('statSkipped').textContent = skippedCount;
        }

        // File Upload - ULTRA FLEXIBLE
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        dropZone.addEventListener('click', () => fileInput.click());
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
            dropZone.addEventListener(e, (ev) => {
                ev.preventDefault();
                ev.stopPropagation();
            });
        });

        dropZone.addEventListener('drop', (e) => {
            if (e.dataTransfer.files.length) {
                processFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                processFile(e.target.files[0]);
            }
        });

        async function processFile(file) {
            loadedCount = 0;
            skippedCount = 0;
            
            document.getElementById('progress').style.display = 'block';
            updateProgress(10);

            try {
                const text = await file.text();
                updateProgress(30);

                // AUTO DETECT FORMAT
                let souls = [];

                // 1. Try JSON
                if (file.name.endsWith('.json') || text.trim().startsWith('[') || text.trim().startsWith('{')) {
                    try {
                        const json = JSON.parse(text);
                        souls = Array.isArray(json) ? json : [json];
                    } catch(e) {
                        // JSON parse failed, try other methods
                    }
                }

                // 2. Try SQL (if JSON failed or SQL file)
                if (souls.length === 0 && (file.name.endsWith('.sql') || text.includes('INSERT INTO'))) {
                    souls = parseSQL(text);
                }

                // 3. Try CSV (if others failed)
                if (souls.length === 0 && (file.name.endsWith('.csv') || text.includes(','))) {
                    souls = parseCSV(text);
                }

                // 4. Try generic text parse (last resort)
                if (souls.length === 0) {
                    souls = parseGeneric(text);
                }

                updateProgress(50);

                // Import
                const total = souls.length;
                for (let i = 0; i < souls.length; i++) {
                    if (await importSoul(souls[i])) {
                        loadedCount++;
                    } else {
                        skippedCount++;
                    }
                    
                    if (i % 100 === 0) {
                        updateProgress(50 + ((i / total) * 50));
                        await new Promise(r => setTimeout(r, 1));
                    }
                }

                updateProgress(100);
                setTimeout(() => {
                    document.getElementById('progress').style.display = 'none';
                    updateProgress(0);
                }, 500);

                updateList();
                updateStats();
                showToast(`${loadedCount} kayıt yüklendi, ${skippedCount} atlandı`, 'success');

            } catch(e) {
                document.getElementById('progress').style.display = 'none';
                showToast('Hata: ' + e.message, 'error');
                console.error(e);
            }
        }

        function updateProgress(percent) {
            document.getElementById('progressBar').style.width = percent + '%';
        }

        // SQL Parser - ROBUST
        function parseSQL(text) {
            const souls = [];
            
            // Find all value rows between parentheses
            const regex = /\(([^)]+)\)/g;
            let match;
            
            while ((match = regex.exec(text)) !== null) {
                const values = match[1].split(',').map(v => {
                    v = v.trim();
                    // Remove quotes
                    if ((v.startsWith("'") && v.endsWith("'")) || 
                        (v.startsWith('"') && v.endsWith('"'))) {
                        v = v.slice(1, -1);
                    }
                    return v === 'NULL' ? '' : v;
                });
                
                // Try to detect which column is discord_id (usually first numeric or first string)
                const soul = {
                    discord_id: values[0] || '',
                    name: values[1] || '',
                    username: values[2] || values[1] || '',
                    email: values[3] || '',
                    phone: values[4] || '',
                    avatar_url: values[5] || '',
                    notes: values.slice(6).join(', ') || ''
                };
                
                // Only add if looks like valid discord_id (numeric and reasonable length)
                if (soul.discord_id && /^\d{10,20}$/.test(soul.discord_id)) {
                    souls.push(soul);
                }
            }
            
            return souls;
        }

        // CSV Parser
        function parseCSV(text) {
            const souls = [];
            const lines = text.split('\n');
            
            for (const line of lines) {
                const values = line.split(',').map(v => v.trim());
                if (values.length >= 1 && /^\d{10,20}$/.test(values[0])) {
                    souls.push({
                        discord_id: values[0],
                        name: values[1] || '',
                        username: values[2] || '',
                        email: values[3] || '',
                        phone: values[4] || '',
                        avatar_url: values[5] || '',
                        notes: values.slice(6).join(', ')
                    });
                }
            }
            
            return souls;
        }

        // Generic Parser (last resort)
        function parseGeneric(text) {
            const souls = [];
            const lines = text.split('\n');
            
            for (const line of lines) {
                // Look for lines starting with numbers (discord IDs)
                const match = line.match(/^(\d{10,20})[,\s\t]+(.+)?$/);
                if (match) {
                    const parts = (match[2] || '').split(/[,\t]/);
                    souls.push({
                        discord_id: match[1],
                        name: parts[0] || '',
                        username: parts[1] || '',
                        email: parts[2] || '',
                        phone: parts[3] || '',
                        avatar_url: parts[4] || '',
                        notes: parts.slice(5).join(' ')
                    });
                }
            }
            
            return souls;
        }

        async function importSoul(soul) {
            if (!soul || !soul.discord_id) return false;
            
            // Validate discord_id
            if (!/^\d{10,20}$/.test(String(soul.discord_id))) return false;

            const cleanSoul = {
                discord_id: String(soul.discord_id).trim(),
                name: String(soul.name || '').trim(),
                username: String(soul.username || '').trim(),
                email: String(soul.email || '').trim(),
                phone: String(soul.phone || '').trim(),
                avatar_url: String(soul.avatar_url || soul.avatar || '').trim(),
                notes: String(soul.notes || '').trim()
            };

            // SQL
            if (useSQL && db) {
                try {
                    await db.from('souls').insert([cleanSoul]);
                } catch(e) {}
            }

            // Local
            const data = getData();
            if (!data.find(x => x.discord_id === cleanSoul.discord_id)) {
                cleanSoul.id = Date.now().toString() + Math.random().toString(36).substr(2, 5);
                cleanSoul.created_at = new Date().toISOString();
                data.push(cleanSoul);
                setData(data);
                return true;
            }
            
            return false;
        }

        function addManual() {
            const soul = {
                discord_id: document.getElementById('newId').value.trim(),
                name: document.getElementById('newName').value.trim(),
                username: document.getElementById('newUser').value.trim(),
                email: document.getElementById('newEmail').value.trim(),
                phone: document.getElementById('newPhone').value.trim(),
                avatar_url: document.getElementById('newAvatar').value.trim(),
                notes: document.getElementById('newNotes').value.trim()
            };

            if (!soul.discord_id) return showToast('Discord ID gerekli', 'error');

            importSoul(soul).then(success => {
                if (success) {
                    showToast('Eklendi', 'success');
                    updateList();
                    updateStats();
                    // Clear form
                    ['newId','newName','newUser','newEmail','newPhone','newAvatar','newNotes'].forEach(id => {
                        document.getElementById(id).value = '';
                    });
                } else {
                    showToast('Bu ID zaten var veya geçersiz', 'error');
                }
            });
        }

        function updateList() {
            const data = getData();
            const container = document.getElementById('soulsList');
            
            // Show last 100 only
            const recent = data.slice(-100).reverse();
            
            container.innerHTML = '<h4 style="color: var(--gold); margin-bottom: 15px;">Kayıtlar (' + data.length + ')</h4>';
            
            if (recent.length === 0) {
                container.innerHTML += '<p style="color: rgba(255,255,255,0.5);">Henüz kayıt yok</p>';
                return;
            }

            recent.forEach(soul => {
                const div = document.createElement('div');
                div.className = 'soul-item';
                div.innerHTML = `
                    <div>
                        <div style="color: var(--gold); font-weight: bold;">${soul.name || 'İsimsiz'}</div>
                        <div style="color: rgba(255,255,255,0.5); font-size: 0.85rem;">${soul.discord_id}</div>
                    </div>
                    <button onclick="deleteSoul('${soul.id}')" style="background: #e74c3c; border: none; color: #fff; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Sil</button>
                `;
                container.appendChild(div);
            });

            if (data.length > 100) {
                container.innerHTML += `<p style="color: rgba(255,255,255,0.3); text-align: center; margin-top: 10px;">... ve ${data.length - 100} kayıt daha</p>`;
            }
        }

        function deleteSoul(id) {
            if (!confirm('Silmek istediğinize emin misiniz?')) return;
            
            if (useSQL && db) {
                try {
                    db.from('souls').delete().eq('id', id);
                } catch(e) {}
            }
            
            setData(getData().filter(x => x.id !== id));
            updateList();
            updateStats();
            showToast('Silindi', 'success');
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // Enter key
        document.getElementById('searchId').addEventListener('keypress', e => {
            if (e.key === 'Enter') search();
        });
        document.getElementById('adminPass').addEventListener('keypress', e => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
